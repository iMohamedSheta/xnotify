name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (${{ matrix.module }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - module: "."
            go-version: "1.24.13"
          - module: "goroutine"
            go-version: "1.24.13"
          - module: "asynq"
            go-version: "1.25.11"

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}   # ← matrix, not env

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.module }}-${{ hashFiles(format('{0}/go.sum', matrix.module)) }}
          restore-keys: ${{ runner.os }}-go-${{ matrix.module }}-

      - name: Install dependencies
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
          working-directory: ${{ matrix.module }}
          install-mode: goinstall

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Unformatted files:"
            gofmt -s -l .
            exit 1
          fi

      - name: Run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

  # ─── Lint gate ─────────────────────────────────────────────────────────────
  lint-ok:
    name: Lint (all modules passed)
    runs-on: ubuntu-latest
    needs: lint
    if: always()
    steps:
      - name: Check lint results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "One or more lint jobs failed."
            exit 1
          fi

  # ─── Security ──────────────────────────────────────────────────────────────
  security:
    name: Security (${{ matrix.module }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - module: "."
            go-version: "1.24.13"
          - module: "goroutine"
            go-version: "1.24.13"
          - module: "asynq"
            go-version: "1.25.9"

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.module }}-${{ hashFiles(format('{0}/go.sum', matrix.module)) }}
          restore-keys: ${{ runner.os }}-go-${{ matrix.module }}-

      - name: Install dependencies
        run: go mod download

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ─── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: lint-ok

    strategy:
      fail-fast: false
      matrix:
        include:
          - module: "."
            go-version: "1.24.13"
          - module: "goroutine"
            go-version: "1.24.13"
          - module: "asynq"
            go-version: "1.25.9"

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.module }}-${{ hashFiles(format('{0}/go.sum', matrix.module)) }}
          restore-keys: ${{ runner.os }}-go-${{ matrix.module }}-

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -count=1 -coverprofile=coverage.out ./...  # ← added -coverprofile

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.module == '.' && 'root' || matrix.module }}
          path: ${{ matrix.module }}/coverage.out
          retention-days: 7